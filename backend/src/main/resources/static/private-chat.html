<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>私聊 - 城市点评</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <span class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></span>
      <h1 class="top-bar-title" id="chatPeerName">私聊</h1>
      <div class="top-bar-right"></div>
    </header>
    <div class="chat-msgs" id="chatMsgs">
      <p style="text-align:center;padding:60px 0;color:#999;">加载中...</p>
    </div>
    <div class="chat-input-bar">
      <input type="text" id="chatInput" placeholder="输入消息..." maxlength="500">
      <button id="chatSendBtn" onclick="sendMsg()">发送</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/private-chat.js"></script>
</body>
</html>
