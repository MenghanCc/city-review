<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商户详情 - 城市点评</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/shop-detail.css">
</head>
<body>
  <div id="app">
    <header class="top-bar" id="topBar">
      <span class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></span>
      <h1 class="top-bar-title" id="shopName">商户详情</h1>
      <span class="top-bar-right"></span>
    </header>

    <!-- 图片轮播 -->
    <div class="sd-images" id="sdImages"></div>

    <!-- 商户信息卡片 -->
    <div class="sd-info-card" id="sdInfo"></div>

    <!-- 营业信息 -->
    <div class="sd-biz-card" id="sdBiz"></div>

    <!-- 商户简介（折叠） -->
    <div class="sd-desc-card" id="sdDesc"></div>

    <!-- 优惠券 -->
    <div class="sd-voucher-card">
      <h3 class="sd-section-title">🎫 优惠券</h3>
      <div id="sdVouchers"><p style="text-align:center;color:#999;padding:10px;">加载中...</p></div>
    </div>

    <!-- 商品 -->
    <div class="sd-product-card">
      <h3 class="sd-section-title">🛒 精选商品</h3>
      <div id="sdProducts"><p style="text-align:center;color:#999;padding:10px;">加载中...</p></div>
    </div>

    <!-- 关联帖子 -->
    <div class="sd-blogs-card">
      <h3 class="sd-section-title">📝 大家说</h3>
      <div id="sdBlogs"><p style="text-align:center;color:#999;padding:20px;">加载中...</p></div>
    </div>

    <!-- 底部栏 -->
    <div class="sd-bottom-bar">
      <div class="sd-bottom-btn sd-fav" id="sdFavBtn" onclick="toggleFav()">
        <i class="far fa-star"></i> <span id="sdFavText">收藏</span>
      </div>
      <div class="sd-bottom-btn sd-review" onclick="goWriteBlog()">
        <i class="fas fa-pen"></i> 写点评
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/shop-detail.js"></script>
</body>
</html>
